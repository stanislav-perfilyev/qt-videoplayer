name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc-14
            cc: gcc-14
            cxx: g++-14
          - compiler: clang-18
            cc: clang-18
            cxx: clang++-18

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            ${{ matrix.compiler == 'gcc-14' && 'gcc-14 g++-14' || 'clang-18 clang++-18' }} \
            cmake \
            qt6-base-dev \
            qt6-multimedia-dev \
            libgtest-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            gstreamer1.0-alsa

      # qt6-multimedia-dev's GStreamer plugin dependencies are only
      # "Recommends" (skipped above via --no-install-recommends, done
      # deliberately to avoid pulling in unrelated GUI/doc packages), so the
      # actual runtime plugins (playbin, decodebin, audio/video sinks) had to
      # be listed explicitly — without them, QMediaPlayer's GStreamer backend
      # fails to create pipeline elements (GStreamer-CRITICAL:
      # gst_element_link_many: assertion 'GST_IS_ELEMENT (element_2)' failed)
      # and segfaults the moment setupPlayer() wires up video/audio output,
      # even before any file is loaded.
      - name: Load dummy ALSA sound card (headless CI has no audio hardware)
        run: sudo modprobe snd-dummy || true

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: |
          QT_QPA_PLATFORM=offscreen ctest --test-dir build --output-on-failure

  cppcheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update -q && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=all \
            --std=c++20 \
            --suppress=missingInclude \
            --suppress=missingIncludeSystem \
            --suppress=unknownMacro \
            --suppress=unmatchedSuppression \
            --suppress=checkersReport \
            --suppress=unusedFunction:tests/* \
            --error-exitcode=1 \
            --quiet \
            src/ include/ tests/
