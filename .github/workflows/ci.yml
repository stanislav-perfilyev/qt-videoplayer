name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc-14
            cc: gcc-14
            cxx: g++-14
          - compiler: clang-18
            cc: clang-18
            cxx: clang++-18

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            ${{ matrix.compiler == 'gcc-14' && 'gcc-14 g++-14' || 'clang-18 clang++-18' }} \
            cmake \
            qt6-base-dev \
            qt6-multimedia-dev \
            libgtest-dev

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}

      - name: Build
        run: cmake --build build --parallel

      # TEMPORARY DIAGNOSTIC — remove once the vtable/staticMetaObject link
      # failure is root-caused. Three different linking strategies (OBJECT
      # library, hand-rolled --whole-archive, $<LINK_LIBRARY:WHOLE_ARCHIVE>)
      # have all failed with byte-identical undefined-reference output,
      # which points at moc generation rather than archive/link ordering.
      - name: Debug moc output
        if: always()
        run: |
          echo "--- mocs_compilation.cpp for player_lib ---"
          find build -path "*player_lib_autogen*mocs_compilation.cpp" -exec cat {} \;
          echo "--- find any moc_videoplayer_window.cpp ---"
          find build -iname "moc_videoplayer_window*"
          echo "--- nm libplayer_lib.a | grep VideoPlayerWindow ---"
          nm build/libplayer_lib.a 2>&1 | grep -i VideoPlayerWindow || echo "(no matches)"
          echo "--- nm on the mocs_compilation.cpp.o member specifically ---"
          find build -path "*player_lib.dir*mocs_compilation.cpp.o" -exec nm {} \; 2>&1 | head -50

      - name: Test
        run: |
          QT_QPA_PLATFORM=offscreen ctest --test-dir build --output-on-failure

  cppcheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update -q && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=all \
            --std=c++20 \
            --suppress=missingInclude \
            --suppress=missingIncludeSystem \
            --suppress=unknownMacro \
            --suppress=unmatchedSuppression \
            --suppress=checkersReport \
            --suppress=unusedFunction:tests/* \
            --error-exitcode=1 \
            --quiet \
            src/ include/ tests/
