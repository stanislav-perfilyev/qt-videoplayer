name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc-14
            cc: gcc-14
            cxx: g++-14
          - compiler: clang-18
            cc: clang-18
            cxx: clang++-18

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            ${{ matrix.compiler == 'gcc-14' && 'gcc-14 g++-14' || 'clang-18 clang++-18' }} \
            cmake \
            qt6-base-dev \
            qt6-multimedia-dev \
            libgtest-dev

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_AUTOMOC_VERBOSE=ON

      # TEMPORARY DIAGNOSTIC — mocs_compilation.cpp for player_lib comes out
      # empty ("No files found that require moc"), and nm confirms vtable/
      # staticMetaObject are undefined everywhere in the archive — moc is
      # never being run for VideoPlayerWindow at all. That's a moc-detection
      # problem, not the link-ordering problem three earlier fixes assumed.
      - name: Debug AutogenInfo before build
        run: |
          echo "--- HEADERS/SOURCES fields from player_lib_autogen.dir/AutogenInfo.json ---"
          AUTOGEN_JSON=$(find build -path "*player_lib_autogen.dir/AutogenInfo.json" | head -1)
          echo "Using: $AUTOGEN_JSON"
          python3 -c "
import json, sys
d = json.load(open(sys.argv[1]))
for k in ('HEADERS', 'SOURCES', 'HEADER_EXTENSIONS', 'MOC_SKIP', 'MOC_RELAXED_MODE', 'INCLUDE_DIR'):
    print(k, '=', d.get(k))
" "$AUTOGEN_JSON"
          echo "--- ParseCache.txt for player_lib_autogen (per-file moc detection) ---"
          find build -path "*player_lib_autogen.dir*ParseCache.txt" -exec cat {} \;
          echo "--- videoplayer_window.cpp as checked out (hexdump first 200 bytes, catch encoding issues) ---"
          head -c 200 src/videoplayer_window.cpp | xxd
          echo "--- grep Q_OBJECT in the header as checked out ---"
          grep -n "Q_OBJECT" include/videoplayer_window.h | cat -A

      - name: Build
        run: |
          set -o pipefail
          VERBOSE=1 cmake --build build --parallel 2>&1 | tee build.log

      - name: Show AUTOMOC-relevant build log lines
        if: always()
        run: grep -iE "automoc|moc:|videoplayer_window" build.log || echo "(no automoc-related lines found)"

      - name: Debug moc output
        if: always()
        run: |
          echo "--- mocs_compilation.cpp for player_lib ---"
          find build -path "*player_lib_autogen*mocs_compilation.cpp" -exec cat {} \;
          echo "--- find any moc_videoplayer_window.cpp ---"
          find build -iname "moc_videoplayer_window*"
          echo "--- nm libplayer_lib.a | grep VideoPlayerWindow ---"
          nm build/libplayer_lib.a 2>&1 | grep -i VideoPlayerWindow || echo "(no matches)"
          echo "--- nm on the mocs_compilation.cpp.o member specifically ---"
          find build -path "*player_lib.dir*mocs_compilation.cpp.o" -exec nm {} \; 2>&1 | head -50

      - name: Test
        run: |
          QT_QPA_PLATFORM=offscreen ctest --test-dir build --output-on-failure

  cppcheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update -q && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=all \
            --std=c++20 \
            --suppress=missingInclude \
            --suppress=missingIncludeSystem \
            --suppress=unknownMacro \
            --suppress=unmatchedSuppression \
            --suppress=checkersReport \
            --suppress=unusedFunction:tests/* \
            --error-exitcode=1 \
            --quiet \
            src/ include/ tests/
